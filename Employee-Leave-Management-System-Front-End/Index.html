<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styling.css" />

    <title>Leave Management System</title>
</head>
<body>
<div id="auth-page">
    <div class="auth-card card">
        <div class="card-body">
            <div class="text-center mb-4">
                <div class="auth-logo">🌿</div>
                <h4 class="fw-bold mb-0 text-primary">Leave Management</h4>
                <p class="text-muted small mt-1">Sign in to your account</p>
            </div>

            <!-- tab switcher -->
            <div class="btn-group w-100 mb-4 auth-tabs" role="group">
                <button id="tab-btn-login"    type="button" class="btn btn-primary"   onclick="showAuthTab('login')">Login</button>
                <button id="tab-btn-register" type="button" class="btn btn-outline-primary" onclick="showAuthTab('register')">Register</button>
            </div>

            <!-- login -->
            <div id="login-form">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="login-email" class="form-control" placeholder="Enter your email" />
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="login-password" class="form-control" placeholder="Enter your password" />
                    </div>
                </div>
                <button class="btn btn-primary w-100 py-2 fw-semibold" onclick="login()">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </div>

            <!-- reg  -->
            <div id="register-form" style="display:none">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="reg-name" class="form-control" placeholder="Your full name" />
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="reg-email" class="form-control" placeholder="Your email" />
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="reg-password" class="form-control" placeholder="Choose a password" />
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Role</label>
                    <select id="reg-role" class="form-select">
                        <option value="EMPLOYEE">Employee</option>
                        <option value="MANAGER">Manager</option>
                    </select>
                </div>
                <button class="btn btn-primary w-100 py-2 fw-semibold" onclick="register()">
                    <i class="bi bi-person-plus me-2"></i>Create Account
                </button>

            </div>
        </div>
    </div>
</div>

<div id="app-page">
    <div class="app-layout">

        <!-- SIDEBAR -->
        <div id="sidebar">
            <div class="sidebar-brand">
                <i class="bi bi-leaf me-2"></i>LeaveApp
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item-btn active" id="nav-btn-dashboard" onclick="showPage('dashboard')">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </button>
                <button class="nav-item-btn" id="nav-btn-apply" onclick="showPage('apply')">
                    <i class="bi bi-plus-circle"></i> Apply Leave
                </button>
                <button class="nav-item-btn" id="nav-btn-my-leaves" onclick="showPage('my-leaves')">
                    <i class="bi bi-journal-text"></i> My Leaves
                </button>
                <button class="nav-item-btn" id="nav-btn-balance" onclick="showPage('balance')">
                    <i class="bi bi-bar-chart-line"></i> Leave Balance
                </button>
                <button class="nav-item-btn" id="nav-btn-calendar" onclick="showPage('calendar')">
                    <i class="bi bi-calendar3"></i> Calendar
                </button>
                <button class="nav-item-btn" id="nav-btn-users" onclick="showPage('users')">
                    <i class="bi bi-people"></i> All Users
                </button>

                <!-- only Manager  can see -->
                <button class="nav-item-btn" id="nav-pending" style="display:none" onclick="showPage('pending')">
                    <i class="bi bi-check2-circle"></i> Approvals
                </button>
                <button class="nav-item-btn" id="nav-all-leaves" style="display:none" onclick="showPage('all-leaves')">
                    <i class="bi bi-folder2-open"></i> All Leaves
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user-name" id="user-name-display">—</div>
                <div class="sidebar-user-role text-uppercase" id="user-role-display">—</div>
                <button class="btn btn-outline-secondary btn-sm mt-2 w-100" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </div>
        </div>






    </div>
</div>



<div id="toast-container"
     style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
</div>
<script src="main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>


</html>
